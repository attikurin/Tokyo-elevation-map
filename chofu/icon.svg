<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e57c2"/>
      <stop offset="100%" stop-color="#5e35b1"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#311b92"/>
      <stop offset="100%" stop-color="#4527a0"/>
    </linearGradient>
  </defs>
  <!-- 背景（深紫＝映画フィルムの闇） -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 国分寺崖線（手前の丘） -->
  <path d="M0,360 Q120,300 220,330 T380,310 T512,340 L512,512 L0,512 Z" fill="url(#hill)"/>

  <!-- 多摩川低地（白い川） -->
  <path d="M0,420 Q140,400 260,415 T512,400 L512,440 Q360,455 240,445 T0,455 Z"
        fill="#ffffff" opacity="0.85"/>

  <!-- 神代植物公園のバラ（黄色アクセント） -->
  <circle cx="370" cy="180" r="38" fill="#ffb300"/>
  <circle cx="370" cy="180" r="20" fill="#ff8f00"/>
  <circle cx="370" cy="180" r="8" fill="#ffd54f"/>

  <!-- 映画フィルムのリール（左上） -->
  <circle cx="140" cy="160" r="62" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.95"/>
  <circle cx="140" cy="160" r="14" fill="#ffffff" opacity="0.95"/>
  <circle cx="140" cy="118" r="9" fill="#ffffff" opacity="0.85"/>
  <circle cx="140" cy="202" r="9" fill="#ffffff" opacity="0.85"/>
  <circle cx="98"  cy="160" r="9" fill="#ffffff" opacity="0.85"/>
  <circle cx="182" cy="160" r="9" fill="#ffffff" opacity="0.85"/>

  <!-- 深大寺の鳥居（右下、シンボル） -->
  <g transform="translate(420,360)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="-30" y1="0" x2="30" y2="0"/>
    <line x1="-34" y1="-8" x2="34" y2="-8"/>
    <line x1="-22" y1="0" x2="-22" y2="38"/>
    <line x1="22" y1="0" x2="22" y2="38"/>
  </g>
</svg>
