<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ebaaa"/>
      <stop offset="100%" stop-color="#00897b"/>
    </linearGradient>
  </defs>
  <!-- Background with safe area for maskable -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <!-- 下総台地 (Shimousa Plateau silhouette) -->
  <path d="M 60 380 L 60 250 L 180 250 L 200 200 L 320 200 L 340 250 L 452 250 L 452 380 Z" fill="#00695c" opacity="0.85"/>
  <!-- 利根川 (Tone River - large wave) -->
  <path d="M 60 320 Q 130 300 200 320 Q 270 340 340 320 Q 410 300 452 320 L 452 380 L 60 380 Z" fill="#ffffff" opacity="0.55"/>
  <path d="M 60 350 Q 130 335 200 350 Q 270 365 340 350 Q 410 335 452 350 L 452 380 L 60 380 Z" fill="#ffffff" opacity="0.7"/>
  <!-- 稲穂 (rice ear - 取手は稲作・地名「取手」由来も砦／田) -->
  <g transform="translate(370,130)" stroke="#ffb300" stroke-width="6" fill="#ffb300">
    <path d="M 0 70 L 0 -50" stroke-linecap="round"/>
    <ellipse cx="-14" cy="-30" rx="8" ry="14" transform="rotate(-25 -14 -30)"/>
    <ellipse cx="14" cy="-30" rx="8" ry="14" transform="rotate(25 14 -30)"/>
    <ellipse cx="-16" cy="-8" rx="8" ry="14" transform="rotate(-25 -16 -8)"/>
    <ellipse cx="16" cy="-8" rx="8" ry="14" transform="rotate(25 16 -8)"/>
    <ellipse cx="-16" cy="14" rx="8" ry="14" transform="rotate(-25 -16 14)"/>
    <ellipse cx="16" cy="14" rx="8" ry="14" transform="rotate(25 16 14)"/>
    <ellipse cx="0" cy="-46" rx="8" ry="14"/>
  </g>
  <!-- Base line -->
  <rect x="60" y="378" width="392" height="6" fill="#ffffff" opacity="0.85" rx="3"/>
</svg>
