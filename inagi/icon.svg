<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#76d275"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
  </defs>
  <!-- Safe area (maskable icons need 40% safe zone) -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <!-- 多摩丘陵 (rolling hills) -->
  <path d="M 60 380 Q 140 280 220 320 Q 300 350 380 270 Q 440 220 452 380 Z" fill="#1b5e20" opacity="0.85"/>
  <path d="M 60 380 Q 160 320 260 350 Q 340 370 452 310 L 452 380 Z" fill="#ffffff" opacity="0.7"/>
  <!-- 梨の花 (pear blossom symbolizing 稲城梨) -->
  <g transform="translate(360,150)">
    <circle cx="0" cy="-22" r="20" fill="#ffffff"/>
    <circle cx="20" cy="-7" r="20" fill="#ffffff"/>
    <circle cx="12" cy="18" r="20" fill="#ffffff"/>
    <circle cx="-12" cy="18" r="20" fill="#ffffff"/>
    <circle cx="-20" cy="-7" r="20" fill="#ffffff"/>
    <circle cx="0" cy="0" r="12" fill="#ec407a"/>
  </g>
  <!-- Base line -->
  <rect x="60" y="378" width="392" height="6" fill="#ffffff" opacity="0.8" rx="3"/>
</svg>
