<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63a4ff"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
  </defs>
  <!-- Safe area (maskable icons need 40% safe zone) -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  <!-- 立川崖線 (Tachikawa cliff line - sharp step terrain) -->
  <path d="M 60 380 L 60 280 L 200 280 L 220 220 L 360 220 L 380 160 L 452 160 L 452 380 Z" fill="#0d47a1" opacity="0.85"/>
  <path d="M 60 380 L 60 320 L 200 320 L 220 280 L 360 280 L 380 240 L 452 240 L 452 380 Z" fill="#ffffff" opacity="0.7"/>
  <!-- 多摩モノレールのレール（横ライン）-->
  <rect x="80" y="120" width="352" height="6" fill="#ffffff" opacity="0.85" rx="3"/>
  <rect x="80" y="135" width="352" height="3" fill="#ffffff" opacity="0.6" rx="1.5"/>
  <!-- イチョウの葉 (yellow ginkgo leaf - Showa Memorial Park) -->
  <g transform="translate(380,80)">
    <circle cx="0" cy="0" r="32" fill="#fbc02d"/>
    <path d="M 0 -22 Q -18 -8 -14 12 Q 0 8 14 12 Q 18 -8 0 -22 Z" fill="#ffffff" opacity="0.95"/>
  </g>
  <!-- Base line -->
  <rect x="60" y="378" width="392" height="6" fill="#ffffff" opacity="0.8" rx="3"/>
</svg>
